services:
  - type: web
    name: safecom-backend
    runtime: node
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    autoDeploy: true
    preDeployCommand: npm run migrate
    healthCheckPath: /api/health
